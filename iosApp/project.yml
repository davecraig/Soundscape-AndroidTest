name: iosApp
options:
  bundleIdPrefix: org.scottishtecharmy.soundscape
  deploymentTarget:
    iOS: "16.0"
configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig
settings:
  ENABLE_BITCODE: "NO"
  DEVELOPMENT_TEAM: 48N3J4V5KM
  # Defaults for local Xcode runs. CI overrides both via the xcodebuild
  # command line (see .github/workflows/build-app.yaml). Without defaults,
  # Info.plist substitution leaves CFBundleVersion empty and installd
  # refuses to install the Share Extension (MissingBundleVersion).
  MARKETING_VERSION: "0.0.0"
  CURRENT_PROJECT_VERSION: "1"
packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    version: 6.17.1
  RealmSwift:
    url: https://github.com/realm/realm-swift
    from: 20.0.4
targets:
  iosApp:
    type: application
    platform: iOS
    dependencies:
      - package: MapLibre
        product: MapLibre
      - package: RealmSwift
        product: RealmSwift
        embed: true
      - target: ShareExtension
        embed: true
    sources:
      - path: iosApp
      - path: ../shared/src/commonMain/resources/address
        type: folder
      - path: ../app/src/main/assets/open_source_licenses.json
        buildPhase: resources
      - path: ../app/src/main/assets/osm-liberty-accessible
        type: folder
      - path: ../app/src/main/assets/Sounds
        type: folder
      - path: ../app/src/main/assets/DoubleTap/dt_soundscape.mp3
        buildPhase: resources
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: Soundscape
        CFBundleName: Soundscape
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        CADisableMinimumFrameDurationOnPhone: true
        NSLocationWhenInUseUsageDescription: "Soundscape needs your location to provide audio navigation and describe your surroundings."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Soundscape needs your location to provide audio navigation even when the app is in the background."
        NSMotionUsageDescription: "Soundscape uses motion data to detect the direction you are facing and orient audio callouts to your surroundings."
        UIBackgroundModes:
          - audio
          - location
        UILaunchScreen:
          UIColorName: SplashBackground
          UIImageName: SoundscapeLogo
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        TileProviderURL: "$(TILE_PROVIDER_URL)"
        SearchProviderURL: "$(SEARCH_PROVIDER_URL)"
        ExtractProviderURL: "$(EXTRACT_PROVIDER_URL)"
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleURLTypes:
          - CFBundleURLName: org.scottishtecharmy.soundscape.geo
            CFBundleURLSchemes: [geo]
          - CFBundleURLName: org.scottishtecharmy.soundscape.soundscape
            CFBundleURLSchemes: [soundscape]
        CFBundleDocumentTypes:
          - CFBundleTypeName: Soundscape Route
            LSHandlerRank: Owner
            LSItemContentTypes:
              - org.scottishtecharmy.soundscape.route-json
              - public.json
            CFBundleTypeRole: Editor
          - CFBundleTypeName: GPX Route
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.topografix.gpx
              - public.xml
            CFBundleTypeRole: Viewer
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: org.scottishtecharmy.soundscape.route-json
            UTTypeDescription: Soundscape Route
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - json
          - UTTypeIdentifier: com.topografix.gpx
            UTTypeDescription: GPX File
            UTTypeConformsTo:
              - public.xml
            UTTypeTagSpecification:
              public.filename-extension:
                - gpx
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.scottishtecharmy.soundscape
      PRODUCT_NAME: Soundscape
      FRAMEWORK_SEARCH_PATHS:
        - "$(inherited)"
        - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
      OTHER_LINKER_FLAGS:
        - "$(inherited)"
        - "-framework"
        - "Shared"
      CODE_SIGN_ENTITLEMENTS: iosApp/iosApp.entitlements
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false

  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iosAppTests
    dependencies:
      - target: iosApp
    settings:
      # The host app's target is `iosApp` but PRODUCT_NAME is `Soundscape`,
      # so xcodegen's auto-derived TEST_HOST (based on target name) points
      # at a non-existent binary. Override it to the real product path.
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/Soundscape.app/Soundscape
      BUNDLE_LOADER: $(TEST_HOST)
      GENERATE_INFOPLIST_FILE: "YES"

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - Info.plist
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Soundscape
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationQueriesSchemes:
          - soundscape
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule: 'SUBQUERY(extensionItems, $extensionItem, SUBQUERY($extensionItem.attachments, $attachment, ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "com.apple.mapkit.map-item" || ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.url" || ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.plain-text").@count > 0).@count > 0'
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.scottishtecharmy.soundscape.share
      SKIP_INSTALL: "YES"

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
        iosAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - iosAppTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
