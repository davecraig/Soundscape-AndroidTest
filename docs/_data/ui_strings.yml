# Translations for the docs website's UI chrome (the search box placeholder and
# the GitHub auxiliary link at the top of every page). Keyed by the web/BCP-47
# code used in _config.yml `languages`.
#
# Unlike the app's user-facing text, these strings are website-only: they are
# NOT part of the Weblate-managed Android string resources, so they cannot come
# through the normal translation loop. They are machine-translated here instead,
# mirroring how the localized homepage (index.<lang>.md) is produced. Native
# speakers are very welcome to refine any of them.
#
# "Soundscape" and "GitHub" are brand names and are left untranslated.
# Any language without an entry falls back to English (see the consuming
# includes: _includes/search_placeholder_custom.html and
# _includes/components/aux_nav.html).

