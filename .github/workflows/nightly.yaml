  firebase:
    name: Run UI tests with Firebase Test Lab (${{ matrix.ref }})
    needs: build
    environment: development
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ref: [main, v1.0, multiplatform]

    steps:
      - name: Download app APK
        uses: actions/download-artifact@v8
        with:
          name: release-apk-${{ matrix.ref }}

#      - name: Download Android test APK
#        uses: actions/download-artifact@v8
#        with:
#          name: release-androidTest

      - name: Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCLOUD_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set current project
        run: gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}

# These tests now need the pmtiles file, skip for now as we already test locally
