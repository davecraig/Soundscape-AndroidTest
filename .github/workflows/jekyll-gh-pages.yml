# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Dokka build
  dokkaBuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '19'

      - name: Dokka build
        run: ./gradlew dokkaGenerate

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dokka
          path: app/build/dokka/html/

  # Pages build job
  build:
    runs-on: ubuntu-latest
    needs: dokkaBuild
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
          working-directory: '${{ github.workspace }}/docs'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install beacon generator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y vorbis-tools
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy scipy matplotlib

      - name: Generate beacon audio samples and spectrum plots
        run: python3 generate-beacons.py

      - name: Stage offline map extracts manifest
        run: |
          mkdir -p assets
          gunzip -c ../app/src/test/res/org/scottishtecharmy/soundscape/manifest.geojson.gz \
            > assets/manifest.geojson

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Download all workflow run artifacts in order to get Dokka docs
        uses: actions/download-artifact@v8
        with:
          path: docs/dokka


      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs/_site/

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
