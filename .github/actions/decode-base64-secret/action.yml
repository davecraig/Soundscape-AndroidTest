name: Decode base64 secret
description: Decodes a base64-encoded secret to a file at the given path.

inputs:
  encoded:
    description: Base64-encoded payload
    required: true
  output_path:
    description: Path where the decoded bytes should be written
    required: true

runs:
  using: composite
  steps:
    - name: Decode
      shell: bash
      env:
        ENCODED_STRING: ${{ inputs.encoded }}
        OUTPUT_PATH: ${{ inputs.output_path }}
      run: |
        mkdir -p "$(dirname "$OUTPUT_PATH")"
        printf '%s' "$ENCODED_STRING" | base64 -d > "$OUTPUT_PATH"
