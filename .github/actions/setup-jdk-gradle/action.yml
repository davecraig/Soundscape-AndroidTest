name: Setup JDK and Gradle
description: Installs Zulu JDK 19 and configures the Gradle build action with caching.

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: '19'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
